<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin | KRYONIX</title>
  <link rel="icon" type="image/png" href="images/icon.png">
  <meta name="theme-color" content="#dc2626">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Space Grotesk','sans-serif'], mono: ['JetBrains Mono','monospace'] },
        colors: {
          dark: { bg:'#07070a', card:'#0f0f14', card2:'#141419', border:'#1e1e28', hover:'#1a1a22' },
          red: { accent:'#dc2626', bright:'#ef4444', dim:'#991b1b', glow:'rgba(220,38,38,.15)', glow2:'rgba(220,38,38,.08)' },
          muted: { 1:'#a1a1aa', 2:'#71717a', 3:'#52525b', 4:'#3f3f46' }
        }
      }}
    }
  </script>
  <style>
    :root{--bg:#07070a;--card:#0f0f14;--border:#1e1e28;--red:#dc2626;--red-bright:#ef4444;--red-glow:rgba(220,38,38,.15)}
    *{scrollbar-width:thin;scrollbar-color:#1e1e28 transparent}
    body{background:var(--bg);color:#e4e4e7;font-family:'Space Grotesk',sans-serif;overflow:hidden}

    .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;animation:orbFloat 12s ease-in-out infinite;pointer-events:none}
    .orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(220,38,38,.4),transparent 70%);top:-10%;left:-8%;animation-delay:0s}
    .orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(220,38,38,.25),transparent 70%);bottom:-15%;right:-5%;animation-delay:-4s;animation-duration:15s}
    .orb-3{width:250px;height:250px;background:radial-gradient(circle,rgba(153,27,27,.3),transparent 70%);top:50%;left:60%;animation-delay:-8s;animation-duration:18s}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-40px) scale(1.08)}50%{transform:translate(-20px,30px) scale(.95)}75%{transform:translate(15px,15px) scale(1.03)}}

    .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(220,38,38,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(220,38,38,.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 20%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 20%,transparent 70%)}

    .scanline{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(220,38,38,.012) 2px,rgba(220,38,38,.012) 4px);pointer-events:none}

    .login-card{position:relative;background:rgba(15,15,20,.85);backdrop-filter:blur(40px) saturate(1.2);border:1px solid rgba(30,30,40,.8);box-shadow:0 0 0 1px rgba(220,38,38,.05),0 25px 60px -12px rgba(0,0,0,.6),0 0 120px -40px rgba(220,38,38,.08)}
    .login-card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(220,38,38,.4),transparent);border-radius:999px}

    .input-wrap{position:relative}
    .input-wrap input{width:100%;background:rgba(7,7,10,.7);border:1px solid var(--border);border-radius:12px;padding:14px 16px 14px 48px;color:#e4e4e7;font-size:.9rem;font-family:'Space Grotesk',sans-serif;transition:all .25s ease;outline:none}
    .input-wrap input::placeholder{color:#3f3f46}
    .input-wrap input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.08),0 0 20px -5px rgba(220,38,38,.1)}
    .input-wrap .input-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#3f3f46;font-size:.9rem;transition:color .25s}
    .input-wrap input:focus ~ .input-icon{color:var(--red)}
    .input-wrap .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#3f3f46;cursor:pointer;padding:4px;transition:color .15s;font-size:.85rem}
    .input-wrap .toggle-pw:hover{color:#a1a1aa}

    .btn-login{position:relative;overflow:hidden;width:100%;padding:14px;background:var(--red);color:white;font-weight:700;font-size:.9rem;border:none;border-radius:12px;cursor:pointer;transition:all .25s ease;font-family:'Space Grotesk',sans-serif;letter-spacing:.02em}
    .btn-login:hover:not(:disabled){background:var(--red-bright);transform:translateY(-1px);box-shadow:0 8px 30px -8px rgba(220,38,38,.4)}
    .btn-login:active:not(:disabled){transform:translateY(0);box-shadow:0 2px 10px -4px rgba(220,38,38,.3)}
    .btn-login:disabled{opacity:.6;cursor:not-allowed}
    .btn-login::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:rgba(255,255,255,.15);border-radius:50%;transform:translate(-50%,-50%);transition:width .5s,height .5s}
    .btn-login:active::after{width:400px;height:400px}

    .spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.25);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    .shake{animation:shake .4s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

    .toast-login{position:fixed;top:1.5rem;right:1.5rem;padding:.85rem 1.3rem;border-radius:12px;font-size:.8rem;font-weight:600;z-index:999;transform:translateY(-120px);opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px)}
    .toast-login.show{transform:translateY(0);opacity:1}
    .toast-login.error{background:rgba(127,29,29,.9);color:#fca5a5;border:1px solid rgba(239,68,68,.4)}
    .toast-login.success{background:rgba(20,83,45,.9);color:#86efac;border:1px solid rgba(34,197,94,.4)}

    .fade-in{animation:fadeUp .6s cubic-bezier(.16,1,.3,1) both}
    .fade-in-d1{animation-delay:.1s}
    .fade-in-d2{animation-delay:.2s}
    .fade-in-d3{animation-delay:.35s}
    .fade-in-d4{animation-delay:.5s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    .glow-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .glow-dot.red{background:#ef4444;box-shadow:0 0 10px rgba(239,68,68,.5)}
    .glow-dot.green{background:#22c55e;box-shadow:0 0 10px rgba(34,197,94,.5)}

    .brand-icon{width:52px;height:52px;border-radius:16px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.15);display:flex;align-items:center;justify-content:center;position:relative}
    .brand-icon::after{content:'';position:absolute;inset:-1px;border-radius:17px;background:conic-gradient(from 0deg,transparent,rgba(220,38,38,.2),transparent,rgba(220,38,38,.1),transparent);animation:rotate 6s linear infinite;z-index:-1}
    @keyframes rotate{to{transform:rotate(360deg)}}

    .particle{position:absolute;width:2px;height:2px;background:rgba(220,38,38,.4);border-radius:50%;pointer-events:none}
    .p1{top:15%;left:20%;animation:drift 8s ease-in-out infinite}
    .p2{top:70%;left:75%;animation:drift 10s ease-in-out infinite reverse}
    .p3{top:30%;left:80%;animation:drift 7s ease-in-out infinite;animation-delay:-2s}
    .p4{top:80%;left:15%;animation:drift 9s ease-in-out infinite;animation-delay:-4s}
    .p5{top:45%;left:10%;animation:drift 11s ease-in-out infinite;animation-delay:-1s}
    .p6{top:10%;left:65%;animation:drift 8.5s ease-in-out infinite;animation-delay:-3s}
    @keyframes drift{0%,100%{transform:translate(0,0);opacity:.3}25%{transform:translate(15px,-20px);opacity:.7}50%{transform:translate(-10px,25px);opacity:.2}75%{transform:translate(20px,10px);opacity:.6}}

    .lock-icon-wrap{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,rgba(220,38,38,.08),rgba(220,38,38,.02));border:1px solid rgba(220,38,38,.1);display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative}
    .lock-icon-wrap::before{content:'';position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(220,38,38,.06),transparent 70%);animation:lockPulse 3s ease-in-out infinite}
    @keyframes lockPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.5}}
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <!-- Background layers -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-bg"></div>
    <div class="scanline"></div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>
  </div>

  <!-- Login Card -->
  <div class="login-card rounded-2xl w-full max-w-[420px] p-8 md:p-10 relative z-10">

    <!-- Brand Header -->
    <div class="text-center mb-8 fade-in">
      <div class="brand-icon mx-auto mb-4">
        <img src="https://i.pinimg.com/736x/89/75/5d/89755dd7321afe2c3295a39df24e8309.jpg" alt="KRYONIX" class="w-8 h-8 rounded object-contain">
      </div>
      <h1 class="text-2xl font-bold tracking-wide text-white mb-1">KRYONIX</h1>
      <p class="text-[10px] font-mono text-muted-3 tracking-[.25em] uppercase">Admin Authentication</p>
    </div>

    <!-- Lock icon -->
    <div class="lock-icon-wrap mb-6 fade-in fade-in-d1">
      <i class="fas fa-shield-halved text-red-accent text-2xl"></i>
    </div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5" autocomplete="off">

      <!-- Password Field -->
      <div class="fade-in fade-in-d2">
        <label class="block text-[10px] font-mono text-muted-3 mb-2 uppercase tracking-wider">Admin Password</label>
        <div class="input-wrap" id="inputWrap">
          <input
            type="password"
            id="passwordInput"
            placeholder="Masukkan password admin"
            required
            autofocus
            spellcheck="false"
          >
          <i class="fas fa-lock input-icon"></i>
          <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <!-- Error message inline -->
      <div id="errorMsg" class="hidden text-xs font-semibold text-red-400 bg-red-500/8 border border-red-500/15 rounded-lg px-4 py-2.5 flex items-center gap-2 fade-in">
        <i class="fas fa-exclamation-circle flex-shrink-0"></i>
        <span id="errorText">Password salah.</span>
      </div>

      <!-- Submit Button -->
      <div class="fade-in fade-in-d3 pt-1">
        <button type="submit" class="btn-login" id="loginBtn">
          <span id="btnText">Masuk ke Panel</span>
          <span id="btnSpinner" class="hidden"><span class="spinner"></span></span>
        </button>
      </div>
    </form>

    <!-- Footer -->
    <div class="mt-8 pt-5 border-t border-dark-border fade-in fade-in-d4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-xs text-muted-3 hover:text-white transition">
          <i class="fas fa-arrow-left text-[10px]"></i>
          <span>Kembali ke Home</span>
        </a>
        <div class="flex items-center gap-2 text-[10px] text-muted-4 font-mono">
          <div class="glow-dot red"></div>
          <span>SECURED</span>
        </div>
      </div>
      <p class="text-[10px] text-muted-4 text-center mt-3 font-mono tracking-wider">KRYONIX ADMIN v1.0 — AUTHORIZED ACCESS ONLY</p>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastLogin" class="toast-login"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBHPvQ6Bt9f6U3wqDz3CG71HNpcFq3RZRI",
      authDomain: "kryonix-7c55e.firebaseapp.com",
      databaseURL: "https://kryonix-7c55e-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kryonix-7c55e", storageBucket: "kryonix-7c55e.firebasestorage.app",
      messagingSenderId: "917095112473", appId: "1:917095112473:web:dd4120a14724e6e6a02f88", measurementId: "G-9Y77T2V6H7"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    /* Cek apakah sudah login */
    if (sessionStorage.getItem('kryonix_admin') === 'granted') {
      window.location.href = 'index.html';
    }

    /* Toast helper */
    var toastTimer = null;
    function showToast(msg, type) {
      type = type || 'error';
      if (toastTimer) clearTimeout(toastTimer);
      var t = document.getElementById('toastLogin');
      var icon = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-times-circle"></i>';
      t.innerHTML = icon + ' ' + msg;
      t.className = 'toast-login ' + type + ' show';
      toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3500);
    }

    /* Toggle password visibility */
    window.togglePassword = function() {
      var input = document.getElementById('passwordInput');
      var icon = document.getElementById('pwIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    };

    /* Show inline error */
    function showError(msg) {
      var el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.remove('hidden');
      /* Shake animation */
      var wrap = document.getElementById('inputWrap');
      wrap.classList.add('shake');
      setTimeout(function() { wrap.classList.remove('shake'); }, 500);
      /* Focus input */
      document.getElementById('passwordInput').focus();
    }

    function hideError() {
      document.getElementById('errorMsg').classList.add('hidden');
    }

    /* Set loading state */
    function setLoading(on) {
      var btn = document.getElementById('loginBtn');
      var txt = document.getElementById('btnText');
      var spin = document.getElementById('btnSpinner');
      btn.disabled = on;
      txt.classList.toggle('hidden', on);
      spin.classList.toggle('hidden', !on);
    }

    /* Login handler */
    window.handleLogin = async function(e) {
      e.preventDefault();
      hideError();

      var pw = document.getElementById('passwordInput').value;
      if (!pw || pw.trim().length === 0) {
        showError('Password tidak boleh kosong.');
        return;
      }

      setLoading(true);

      try {
        /* Ambil password dari Firebase: settings/admin_password */
        var snap = await get(ref(db, 'settings/admin_password'));
        var storedPw = '';

        if (snap.exists() && snap.val()) {
          /* Bisa string langsung atau object { value: "..." } */
          var raw = snap.val();
          storedPw = (typeof raw === 'object' && raw.value) ? raw.value : String(raw);
        }

        if (!storedPw) {
          /* Fallback: jika belum diset di Firebase, gunakan default */
          storedPw = 'kryonix2025';
        }

        if (pw === storedPw) {
          /* Berhasil */
          showToast('Autentikasi berhasil!', 'success');
          sessionStorage.setItem('kryonix_admin', 'granted');
          setTimeout(function() {
            window.location.href = 'index.html';
          }, 800);
        } else {
          /* Gagal */
          setLoading(false);
          showError('Password salah. Akses ditolak.');
          showToast('Password salah.', 'error');
          /* Clear input setelah delay */
          setTimeout(function() {
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
          }, 600);
        }
      } catch (err) {
        console.error('Login error:', err);
        setLoading(false);
        showError('Koneksi gagal. Periksa jaringan internet.');
        showToast('Koneksi error.', 'error');
      }
    };

    /* Sembunyikan error saat user mulai mengetik */
    document.getElementById('passwordInput').addEventListener('input', hideError);

    /* Focus input on load */
    window.addEventListener('load', function() {
      setTimeout(function() {
        document.getElementById('passwordInput').focus();
      }, 700);
    });
  </script>
</body>
</html>
